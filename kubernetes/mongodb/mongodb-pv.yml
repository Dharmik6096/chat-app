apiVersion: v1
kind: PersistentVolume
metadata:
  name: chatapp-mongodb-pv
spec:
  capacity:
    storage: 4Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /run/desktop/mnt/host/c/k8s/project/full-stack_chatApp/kubernetes/data
    type: DirectoryOrCreate
